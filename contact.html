<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teranga Food - Contact</title>
    <meta name="description" content="Contactez Teranga Food à Dakar pour vos commandes de burgers, frites et spécialités locales.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="about.html" title="A propros">A propros</a>
            <a href="index.html" title="Accueil">Accueil</a>
            <a href="service.html" title="Voir le menu">Menu</a>
            <a href="contact.html" title="Nous contacter">Contact</a>
        </nav>
        <h1>Nous contacter</h1>
        <div class="banner">
            <img src="assets/img/image_acceuil.png" alt="Photos du restaurant Teranga Food">
        </div>
    </header>

    <section class="contact-section">
    <div class="contact-info">
        <h2>Où nous trouver</h2>
        <p>
            <strong>Adresse :</strong><br>
            Avenue Cheikh Anta Diop,<br>
            Dakar, Sénégal
        </p>
        <div class="map-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3859.345678!2d-17.46!3d14.69!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTTCsDQxJzI0LjAiTiAxN8KwMjcnMzYuMCJX!5e0!3m2!1sfr!2ssn!4v123456789" 
                width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </div>

    <div class="contact-form-container">
        <h2>Nous envoyer un message</h2>
        <form action="#" id="contactForm">
            <div class="form-group">
                <label for="Prenom">Prénom <sup>*</sup></label>
                <input type="text" id="Prenom" name="Prenom" placeholder="Votre prénom" required>
            </div>
            <div class="form-group">
                <label for="Nom">Nom <sup>*</sup></label>
                <input type="text" id="Nom" name="Nom" placeholder="Votre nom" required>
            </div>
            <div class="form-group">
                <label for="email">Votre email <sup>*</sup></label>
                <input type="email" id="email" name="email" placeholder="votre@email.fr" required>
            </div>
            <div class="form-group">
                <label for="message">Votre message <sup>*</sup></label>
                <textarea id="message" name="message" rows="5" placeholder="Comment pouvons-nous vous aider ?" required></textarea>
            </div>
            <button type="submit" class="order-btn">Envoyer l'email</button>
        </form>
    </div>
    </section>

    <footer>
        <address>Avenue Cheikh Anta Diop, Dakar, Sénégal</address>
    </footer>

    <script src="javaScript/script.js"></script>
</body>
